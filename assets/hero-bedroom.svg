<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 440" role="img" aria-label="Sypialnia Spanko">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#24344f"/><stop offset="1" stop-color="#16233a"/>
    </linearGradient>
    <radialGradient id="lamp" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e0b968" stop-opacity="0.9"/><stop offset="1" stop-color="#e0b968" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="560" height="440" fill="url(#wall)"/>
  <!-- window / framed art -->
  <rect x="360" y="60" width="120" height="90" rx="6" fill="#1b2942" stroke="#c99a4b" stroke-width="2"/>
  <path d="M368 140 l30 -44 20 26 18 -20 28 38 z" fill="#33507a"/>
  <circle cx="452" cy="82" r="8" fill="#e0b968"/>
  <!-- hanging lamps -->
  <line x1="150" y1="0" x2="150" y2="70" stroke="#c99a4b" stroke-width="1.5"/>
  <circle cx="150" cy="80" r="34" fill="url(#lamp)"/>
  <circle cx="150" cy="78" r="9" fill="#f4d38a"/>
  <line x1="470" y1="0" x2="470" y2="120" stroke="#c99a4b" stroke-width="1.5"/>
  <circle cx="470" cy="132" r="9" fill="#f4d38a"/>
  <circle cx="470" cy="132" r="26" fill="url(#lamp)"/>
  <!-- floor -->
  <rect y="360" width="560" height="80" fill="#0f1a2e"/>
  <ellipse cx="280" cy="380" rx="240" ry="26" fill="#0a1220" opacity="0.7"/>
  <!-- bed -->
  <rect x="130" y="150" width="320" height="120" rx="16" fill="#33486b"/>
  <!-- headboard tufting -->
  <g stroke="#283c5c" stroke-width="2" opacity="0.7">
    <line x1="180" y1="158" x2="180" y2="262"/><line x1="240" y1="158" x2="240" y2="262"/>
    <line x1="300" y1="158" x2="300" y2="262"/><line x1="360" y1="158" x2="360" y2="262"/>
    <line x1="400" y1="158" x2="400" y2="262"/>
  </g>
  <!-- mattress + bedding -->
  <rect x="96" y="240" width="380" height="96" rx="12" fill="#ece5d6"/>
  <rect x="96" y="240" width="380" height="26" rx="12" fill="#f6efe1"/>
  <path d="M96 300 q190 -26 380 0 v36 H96 Z" fill="#dccdb0"/>
  <path d="M300 300 q90 -10 176 4 v32 H300 Z" fill="#c99a4b" opacity="0.85"/>
  <!-- pillows -->
  <rect x="120" y="224" width="110" height="48" rx="14" fill="#fbf7ee" transform="rotate(-3 175 248)"/>
  <rect x="240" y="224" width="110" height="48" rx="14" fill="#f2ebd9" transform="rotate(2 295 248)"/>
  <!-- nightstand + plant -->
  <rect x="470" y="300" width="70" height="60" rx="6" fill="#1c2b45"/>
  <rect x="486" y="270" width="10" height="34" fill="#2f7d4f"/>
  <path d="M491 272 q-20 -14 -4 -30 q10 18 4 30z" fill="#3a9b62"/>
  <path d="M491 274 q22 -12 6 -30 q-12 18 -6 30z" fill="#2f7d4f"/>
  <!-- legs -->
  <rect x="112" y="336" width="14" height="24" rx="4" fill="#b98a52"/>
  <rect x="446" y="336" width="14" height="24" rx="4" fill="#b98a52"/>
</svg>
