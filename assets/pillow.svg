  <ellipse cx="200" cy="226" rx="128" ry="18" fill="#d8ccb2" opacity="0.7"/>
  <!-- plump pillow -->
  <path d="M92 150
           q-14 -58 50 -66
           q58 -8 116 0
           q64 8 50 66
           q14 58 -50 66
