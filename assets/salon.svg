<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 440" role="img" aria-label="Salon Spanko">
  <rect width="560" height="440" fill="#1a2740"/>
  <!-- sky glow -->
  <rect width="560" height="200" fill="#22375c"/>
  <!-- building facade -->
  <rect x="90" y="80" width="380" height="300" fill="#2b3d5c"/>
  <rect x="90" y="80" width="380" height="70" fill="#101d33"/>
  <!-- sign -->
  <rect x="150" y="96" width="260" height="40" rx="4" fill="#0b1526" stroke="#c99a4b" stroke-width="1.5"/>
  <text x="280" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#e0b968" letter-spacing="6">SPANKO</text>
  <!-- windows grid -->
  <g fill="#33507a" stroke="#1c2b45" stroke-width="3">
    <rect x="120" y="170" width="70" height="60"/><rect x="210" y="170" width="70" height="60"/>
    <rect x="300" y="170" width="70" height="60"/><rect x="390" y="170" width="50" height="60"/>
    <rect x="120" y="250" width="70" height="60"/><rect x="210" y="250" width="70" height="60"/>
    <rect x="300" y="250" width="70" height="60"/><rect x="390" y="250" width="50" height="60"/>
  </g>
  <!-- window warm light -->
  <g fill="#e0b968" opacity="0.75">
    <rect x="210" y="170" width="70" height="60"/><rect x="300" y="250" width="70" height="60"/>
  </g>
  <!-- shopfront / door -->
  <rect x="230" y="320" width="100" height="60" fill="#101d33" stroke="#c99a4b" stroke-width="2"/>
  <line x1="280" y1="320" x2="280" y2="380" stroke="#c99a4b" stroke-width="1.5"/>
  <!-- ground -->
  <rect y="380" width="560" height="60" fill="#0f1a2e"/>
  <!-- little tree -->
  <rect x="486" y="340" width="8" height="40" fill="#6b4a2a"/>
  <circle cx="490" cy="330" r="22" fill="#2f7d4f"/>
  <!-- moon -->
  <path d="M470 60 a16 16 0 1 0 13 22 a12 12 0 1 1 -13 -22z" fill="#e0b968"/>
</svg>
