<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Stelaż Comfort">
  <rect width="400" height="300" fill="#2a2118"/>
  <circle cx="200" cy="150" r="150" fill="#37291d"/>
  <ellipse cx="200" cy="232" rx="140" ry="18" fill="#1a140d" opacity="0.7"/>
  <!-- frame outer, in perspective -->
  <g stroke="#d8ae6e" stroke-width="6" fill="none" stroke-linejoin="round">
    <path d="M70 190 L110 120 L330 120 L300 190 Z"/>
  </g>
  <!-- slats -->
  <g stroke="#c99a4b" stroke-width="7" stroke-linecap="round">
    <line x1="120" y1="132" x2="322" y2="132"/>
    <line x1="115" y1="144" x2="316" y2="144"/>
    <line x1="110" y1="156" x2="310" y2="156"/>
    <line x1="104" y1="168" x2="304" y2="168"/>
    <line x1="98" y1="180" x2="298" y2="180"/>
  </g>
  <!-- side rails highlight -->
  <path d="M110 120 L70 190" stroke="#e0b968" stroke-width="6" fill="none"/>
  <path d="M330 120 L300 190" stroke="#b98a52" stroke-width="6" fill="none"/>
  <!-- legs -->
  <rect x="74" y="188" width="9" height="30" rx="3" fill="#8a6636"/>
  <rect x="292" y="188" width="9" height="30" rx="3" fill="#8a6636"/>
  <rect x="150" y="130" width="0" height="0"/>
</svg>
